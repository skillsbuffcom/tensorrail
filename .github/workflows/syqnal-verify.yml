# Syqnal Verification Workflow
# Auto-generated by Syqnal. Do not modify -- changes will be detected and
# the verification result will be marked UNTRUSTED.
# To update checks, reconnect your repo in the Syqnal project editor.
name: Syqnal Verification

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Syqnal Hardware CI
        uses: syqnal/hardware-ci@v2.3.5
        with:
          syqnal_project_slug: "tensorrail-mini-fpga-int8-ai-accelerator"
          run_drc: "true"
          run_erc: "true"
          run_rtl_lint: "true"
          run_rtl_sim: "true"
          run_spice: "true"
          run_bom: "true"
          run_synthesis: "true"
          run_openlane: "true"

      - name: Upload verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: syqnal-verification
          path: syqnal-verification.json
          retention-days: 90
